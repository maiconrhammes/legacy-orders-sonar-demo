name: SonarCloud

on:
 push:
   branches:
     - main
     - master

jobs:
 sonar:
   name: SonarCloud Scan
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4

     - name: SonarQube Scan
       uses: SonarSource/sonarqube-scan-action@v6
       env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
Commit.
